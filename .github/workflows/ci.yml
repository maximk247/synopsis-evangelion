name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck schema
        run: pnpm --filter @synopsis/schema typecheck

      - name: Test schema
        run: pnpm --filter @synopsis/schema test

      - name: Validate data against schema
        run: pnpm --filter @synopsis/schema validate

      - name: Check committed JSON Schema is current
        run: |
          pnpm --filter @synopsis/schema gen:schema
          git diff --exit-code -- packages/schema/synopsis.schema.json

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        run: pnpm --filter web typecheck

      - name: Test web
        run: pnpm --filter web test

      - name: Build web
        run: pnpm --filter web build

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm --filter web test:e2e

  parser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy parse_pdf.py

      - name: Test (pytest golden)
        run: python -m pytest -q
